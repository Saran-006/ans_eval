{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3"><i class="fa-solid fa-star text-accent"></i> Evaluation Result</h4>
        <dl class="row">
          <dt class="col-sm-3">Student</dt><dd class="col-sm-9">{{ evaluation.student_name }}</dd>
          <dt class="col-sm-3">Score</dt><dd class="col-sm-9"><span class="badge bg-success">{{ evaluation.score }}</span></dd>
          <dt class="col-sm-3">Answer Sheet</dt><dd class="col-sm-9"><a href="{{ url_for('uploaded_file', filename=evaluation.answer_path) }}" target="_blank"><i class="fa-solid fa-file-pdf"></i> Download</a></dd>
        </dl>
        <hr>
        <p><strong>Details:</strong> {{ evaluation.result_text }}</p>
        <div class="text-end">
          <a href="{{ url_for('view_subject', subj_id=evaluation.subject_id) }}" class="btn btn-secondary btn-sm">Back to Subject</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
