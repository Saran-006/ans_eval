{% extends 'layout.html' %}
{% block content %}
<div class="row mb-4">
  <div class="col">
    <div class="p-4 bg-white rounded-3 shadow-sm">
      <h2 class="mb-1">Welcome to the AI Answer Evaluator</h2>
      <p class="mb-0 text-muted">Quickly add subjects, upload student scripts, and view automatic evaluations all in one place.</p>
    </div>
  </div>
</div>
<div class="row g-4 mt-3">
  {% for subj in subjects %}
  <div class="col-sm-6 col-md-4 col-lg-3">
    <div class="card subject-card shadow-sm h-100" onclick="window.location='{{ url_for('view_subject', subj_id=subj.id) }}';" style="cursor:pointer;">
      <div class="card-body d-flex flex-column justify-content-between">
        <h5 class="card-title text-truncate"><i class="fa-solid fa-book-open-reader me-2"></i>{{ subj.name }}</h5>
        <div class="d-flex justify-content-between align-items-center mt-2">
          <a href="{{ url_for('view_subject', subj_id=subj.id) }}" class="btn btn-sm btn-primary">View <i class="fa-solid fa-arrow-right ms-1"></i></a>
          <form method="post" action="{{ url_for('delete_subject', subj_id=subj.id) }}" onsubmit="return confirm('Delete subject {{ subj.name }} and all evaluations?');">
            <button type="submit" class="btn btn-sm btn-outline-danger ms-2" aria-label="Delete subject">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" class="bi bi-trash">
                <path d="M5.5 5.5A.5.5 0 0 1 6 6v7a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5.5a.5.5 0 0 0-1 0v7a.5.5 0 0 0 1 0V6zM11 6a.5.5 0 0 0-1 0v7a.5.5 0 0 0 1 0V6z"/>
                <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1 0-2h3.086a1 1 0 0 1 .707.293L7.293 2h1.414l.5-.5A1 1 0 0 1 9.5 1h3a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118z"/>
              </svg>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
<div class="row mt-4">
  <div class="col">
    <a href="{{ url_for('create_subject') }}" class="btn btn-success">Add New Subject</a>
  </div>
</div>
{% endblock %}
